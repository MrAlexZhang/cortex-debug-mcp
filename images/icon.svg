<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="chipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f6feb"/>
      <stop offset="100%" style="stop-color:#0d419d"/>
    </linearGradient>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#79c0ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="16" fill="url(#bgGrad)"/>

  <!-- Circuit traces - horizontal left -->
  <line x1="4" y1="44" x2="30" y2="44" stroke="#1f6feb" stroke-width="1.5" opacity="0.6"/>
  <line x1="4" y1="56" x2="30" y2="56" stroke="#1f6feb" stroke-width="1.5" opacity="0.6"/>
  <line x1="4" y1="68" x2="30" y2="68" stroke="#1f6feb" stroke-width="1.5" opacity="0.6"/>
  <line x1="4" y1="80" x2="30" y2="80" stroke="#1f6feb" stroke-width="1.5" opacity="0.6"/>

  <!-- Circuit traces - horizontal right -->
  <line x1="98" y1="44" x2="124" y2="44" stroke="#1f6feb" stroke-width="1.5" opacity="0.6"/>
  <line x1="98" y1="56" x2="124" y2="56" stroke="#1f6feb" stroke-width="1.5" opacity="0.6"/>
  <line x1="98" y1="68" x2="124" y2="68" stroke="#1f6feb" stroke-width="1.5" opacity="0.6"/>
  <line x1="98" y1="80" x2="124" y2="80" stroke="#1f6feb" stroke-width="1.5" opacity="0.6"/>

  <!-- Circuit traces - vertical top -->
  <line x1="44" y1="4" x2="44" y2="30" stroke="#1f6feb" stroke-width="1.5" opacity="0.6"/>
  <line x1="56" y1="4" x2="56" y2="30" stroke="#1f6feb" stroke-width="1.5" opacity="0.6"/>
  <line x1="68" y1="4" x2="68" y2="30" stroke="#1f6feb" stroke-width="1.5" opacity="0.6"/>
  <line x1="80" y1="4" x2="80" y2="30" stroke="#1f6feb" stroke-width="1.5" opacity="0.6"/>

  <!-- Circuit traces - vertical bottom -->
  <line x1="44" y1="98" x2="44" y2="124" stroke="#1f6feb" stroke-width="1.5" opacity="0.6"/>
  <line x1="56" y1="98" x2="56" y2="124" stroke="#1f6feb" stroke-width="1.5" opacity="0.6"/>
  <line x1="68" y1="98" x2="68" y2="124" stroke="#1f6feb" stroke-width="1.5" opacity="0.6"/>
  <line x1="80" y1="98" x2="80" y2="124" stroke="#1f6feb" stroke-width="1.5" opacity="0.6"/>

  <!-- Pin dots - left -->
  <circle cx="30" cy="44" r="2.5" fill="#58a6ff" filter="url(#glow)"/>
  <circle cx="30" cy="56" r="2.5" fill="#58a6ff" filter="url(#glow)"/>
  <circle cx="30" cy="68" r="2.5" fill="#58a6ff" filter="url(#glow)"/>
  <circle cx="30" cy="80" r="2.5" fill="#58a6ff" filter="url(#glow)"/>

  <!-- Pin dots - right -->
  <circle cx="98" cy="44" r="2.5" fill="#58a6ff" filter="url(#glow)"/>
  <circle cx="98" cy="56" r="2.5" fill="#58a6ff" filter="url(#glow)"/>
  <circle cx="98" cy="68" r="2.5" fill="#58a6ff" filter="url(#glow)"/>
  <circle cx="98" cy="80" r="2.5" fill="#58a6ff" filter="url(#glow)"/>

  <!-- Pin dots - top -->
  <circle cx="44" cy="30" r="2.5" fill="#58a6ff" filter="url(#glow)"/>
  <circle cx="56" cy="30" r="2.5" fill="#58a6ff" filter="url(#glow)"/>
  <circle cx="68" cy="30" r="2.5" fill="#58a6ff" filter="url(#glow)"/>
  <circle cx="80" cy="30" r="2.5" fill="#58a6ff" filter="url(#glow)"/>

  <!-- Pin dots - bottom -->
  <circle cx="44" cy="98" r="2.5" fill="#58a6ff" filter="url(#glow)"/>
  <circle cx="56" cy="98" r="2.5" fill="#58a6ff" filter="url(#glow)"/>
  <circle cx="68" cy="98" r="2.5" fill="#58a6ff" filter="url(#glow)"/>
  <circle cx="80" cy="98" r="2.5" fill="#58a6ff" filter="url(#glow)"/>

  <!-- Chip body -->
  <rect x="30" y="30" width="68" height="68" rx="6" fill="url(#chipGrad)" stroke="#388bfd" stroke-width="1.5"/>

  <!-- Chip inner border -->
  <rect x="36" y="36" width="56" height="56" rx="4" fill="none" stroke="#1f6feb" stroke-width="0.8" opacity="0.5"/>

  <!-- AI neural network nodes -->
  <!-- Left nodes -->
  <circle cx="48" cy="52" r="4" fill="#0d1117" stroke="#58a6ff" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="48" cy="64" r="4" fill="#0d1117" stroke="#58a6ff" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="48" cy="76" r="4" fill="#0d1117" stroke="#58a6ff" stroke-width="1.5" filter="url(#glow)"/>

  <!-- Center node -->
  <circle cx="64" cy="64" r="7" fill="#0d1117" stroke="#79c0ff" stroke-width="2" filter="url(#glowStrong)"/>

  <!-- Right nodes -->
  <circle cx="80" cy="52" r="4" fill="#0d1117" stroke="#58a6ff" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="80" cy="64" r="4" fill="#0d1117" stroke="#58a6ff" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="80" cy="76" r="4" fill="#0d1117" stroke="#58a6ff" stroke-width="1.5" filter="url(#glow)"/>

  <!-- Neural connections left to center -->
  <line x1="52" y1="52" x2="57" y2="60" stroke="#58a6ff" stroke-width="1" opacity="0.7"/>
  <line x1="52" y1="64" x2="57" y2="64" stroke="#58a6ff" stroke-width="1" opacity="0.7"/>
  <line x1="52" y1="76" x2="57" y2="68" stroke="#58a6ff" stroke-width="1" opacity="0.7"/>

  <!-- Neural connections center to right -->
  <line x1="71" y1="60" x2="76" y2="52" stroke="#58a6ff" stroke-width="1" opacity="0.7"/>
  <line x1="71" y1="64" x2="76" y2="64" stroke="#58a6ff" stroke-width="1" opacity="0.7"/>
  <line x1="71" y1="68" x2="76" y2="76" stroke="#58a6ff" stroke-width="1" opacity="0.7"/>

  <!-- Center node inner dot (glowing) -->
  <circle cx="64" cy="64" r="3" fill="#58a6ff" filter="url(#glowStrong)"/>

  <!-- Debug breakpoint - top right corner of chip -->
  <circle cx="86" cy="42" r="5" fill="#f85149" filter="url(#glowStrong)"/>
  <circle cx="86" cy="42" r="3" fill="#ff7b72"/>

  <!-- Chip label -->
  <text x="64" y="88" text-anchor="middle" font-family="monospace" font-size="7" font-weight="bold" fill="#8b949e" letter-spacing="1">STM32</text>
</svg>
